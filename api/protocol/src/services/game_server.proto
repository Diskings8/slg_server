syntax = "proto3";
package pb_game;
option go_package = "server.slg.com/api/protocol/pb/pb_game";

import "common.proto";

service GameService {
    rpc Stream(stream common.NodePacket) returns (stream common.NodePacket) {}
}

service GameHandler {
    // 登录服创建玩家
    rpc CreateRole(common.CreateRoleReq) returns (common.CreateRoleRsp);
    rpc LoginOnce(common.LoginOnceReq) returns (common.LoginOnceRsp);
}



